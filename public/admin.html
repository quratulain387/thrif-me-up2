<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel — Thrif Me Up</title>
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#EAD0C3">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="/css/tokens.css">
<link rel="stylesheet" href="/css/home.css">
<link rel="stylesheet" href="/css/placeholders.css">
<link rel="stylesheet" href="/css/admin.css">
</head>
<body>

<div class="admin-shell">
  <aside class="admin-sidebar" id="admin-sidebar">
    <a href="/admin.html" class="nav-logo"><img src="/images/logo.png" alt="Thrif Me Up logo" style="height:34px;"><span>Thrif Me Up</span></a>

    <nav class="admin-nav">
      <a href="#dashboard" data-section="dashboard">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
        Dashboard
      </a>
      <a href="#products" data-section="products">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M20.9 7.5 12 2 3.1 7.5m17.8 0L12 13m8.9-5.5V16.5L12 22m0-9L3.1 7.5m8.9 5.5v9m-8.9-9V16.5L12 22"/></svg>
        Products
      </a>
      <a href="#categories" data-section="categories">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="3" width="8" height="8" rx="1"/><rect x="13" y="3" width="8" height="8" rx="1"/><rect x="3" y="13" width="8" height="8" rx="1"/><rect x="13" y="13" width="8" height="8" rx="1"/></svg>
        Categories
      </a>
      <a href="#orders" data-section="orders">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/></svg>
        Orders
      </a>
      <a href="#customers" data-section="customers">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Customers
      </a>
      <a href="#messages" data-section="messages">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        Messages
      </a>
      <a href="#subscribers" data-section="subscribers">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>
        Subscribers
      </a>
      <a href="#testimonials" data-section="testimonials">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/><path d="M9 9h6M9 12h4"/></svg>
        Testimonials
      </a>
    </nav>

    <div class="admin-sidebar-footer">
      <div style="padding: 0.5rem var(--sp-4); font-size: 0.85rem; color: var(--text-muted-on-dark);">
        Logged in as<br><strong id="admin-user-name" style="color: var(--text-on-dark);">…</strong>
      </div>
      <a href="/" target="_blank">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><path d="M15 3h6v6M10 14 21 3"/></svg>
        View Store
      </a>
      <a href="#" id="admin-logout-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5M21 12H9"/></svg>
        Log Out
      </a>
    </div>
  </aside>

  <main class="admin-main">
    <button class="btn btn-outline admin-mobile-toggle" id="admin-mobile-toggle">☰ Menu</button>
    <div id="admin-content"><div class="admin-empty-state">Loading…</div></div>
  </main>
</div>

<script src="/js/admin.js"></script>
</body>
</html>
