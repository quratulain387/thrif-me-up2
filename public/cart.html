<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Cart — Thrif Me Up</title>
<meta name="theme-color" content="#EAD0C3">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="/css/tokens.css">
<link rel="stylesheet" href="/css/home.css">
<link rel="stylesheet" href="/css/placeholders.css">
<link rel="stylesheet" href="/css/cart.css">
</head>
<body>

<header class="navbar is-scrolled">
  <div class="container nav-inner">
    <a href="/" class="nav-logo"><img src="/images/logo.png" alt="Thrif Me Up logo"><span>Thrif Me Up</span></a>
    <nav class="nav-links" aria-label="Primary">
      <a href="/">Home</a>
      <a href="/shop.html">Shop</a>
      <a href="/categories.html">Categories</a>
      <a href="/about.html">About</a>
      <a href="/contact.html">Contact</a>
    </nav>
    <div class="nav-actions">
      <a href="/login.html" class="nav-icon-btn" aria-label="Account">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M20 21a8 8 0 1 0-16 0"/><circle cx="12" cy="7" r="4"/></svg>
      </a>
      <a href="/wishlist.html" class="nav-icon-btn" aria-label="Wishlist">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"/></svg>
      </a>
      <a href="/cart.html" class="nav-icon-btn" aria-label="Cart">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/></svg>
        <span class="nav-badge" style="display:none;">0</span>
      </a>
    </div>
  </div>
</header>

<main class="container">
  <div style="padding-top: var(--sp-16);">
    <p class="eyebrow">Step 1 of 2</p>
    <h1 style="font-size: var(--fs-h3);">Your Cart</h1>
    <p id="cart-item-count" style="color: var(--text-muted-on-light); margin-top: var(--sp-2);"></p>
  </div>

  <div class="cart-layout" id="cart-layout">
    <div class="cart-items" id="cart-items"></div>

    <aside class="cart-summary" id="cart-summary">
      <h4>Order Summary</h4>
      <div class="summary-row"><span>Subtotal</span><span id="summary-subtotal">Rs. 0</span></div>
      <div class="summary-row"><span>Delivery (flat rate)</span><span>Rs. 250</span></div>
      <div class="summary-row total"><span>Total</span><span id="summary-total">Rs. 0</span></div>
      <a href="/checkout.html" class="btn btn-primary">Proceed to Checkout</a>
      <a href="/shop.html" class="btn-ghost" style="display:block;text-align:center;margin-top:var(--sp-4);">Continue Shopping</a>
    </aside>
  </div>
</main>

<footer class="site-footer">
  <div class="container">
    <div class="footer-bottom">
      <span>© 2026 Thrif Me Up. All rights reserved.</span>
      <span>Made with care in Pakistan 🇵🇰</span>
    </div>
  </div>
</footer>

<script src="/js/main.js"></script>
<script src="/js/cart-utils.js"></script>
<script src="/js/cart.js"></script>
</body>
</html>
